server:
  port: 8000

spring:
  application:
    name: ai-resume-parser
  jackson:
    property-naming-strategy: SNAKE_CASE
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

app:
  cors-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,https://jeuluo.github.io}
  openai-api-key: ${OPENAI_API_KEY:}
  openai-model: ${OPENAI_MODEL:gpt-4.1-mini}
